<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.1.3/tsparticles.confetti.bundle.min.js"></script>
    <title>Painel Atitude Segura</title>

    <style>
      /* Fonte Normal */
      @font-face {
        font-family: "DS-DIGITAL";
        src: url("ds_digital/DS-DIGI.TTF") format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      /* Fonte Negrito (Bold) */
      @font-face {
        font-family: "DS-DIGITAL";
        src: url("ds_digital/DS-DIGIB.TTF") format("truetype");
        font-weight: bold;
        font-style: normal;
      }

      /* Fonte Itálico */
      @font-face {
        font-family: "DS-DIGITAL";
        src: url("ds_digital/DS-DIGII.TTF") format("truetype");
        font-weight: normal;
        font-style: italic;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-width: 100vw;
        font-family: Segoe UI, Arial, sans-serif;
      }

      .painel {
        position: relative;
        width: 100vw;
        height: 56.25vw;
        max-height: 100vh;
        max-width: 177.78vh;

        background-image: url("./images/WhatsApp\ Image\ 2026-06-22\ at\ 22.19.32.jpeg");
        background-size: 100% 100%;
        background-repeat: no-repeat;
        background-position: center;
      }

      /* Número de dias */

      .dias {
        position: absolute;
        white-space: nowrap;
        left: 49%;
        top: 8%;
        font-style: italic;
        transform: translateX(-50%);
        color: #fff;
        font-weight: 900;
        text-shadow: 0 0 2px rgba(255, 255, 255, 0.4), 0 0 6px rgba(255, 255, 255, 0.7);
        letter-spacing: 2px;
      }

      /* Data */

      .data,
      .dia_semana {
        position: absolute;
        white-space: nowrap;
        top: 65%;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        height: 50%;
        letter-spacing: 1px;
        color: #fffffff3;
        text-align: center;
        font-size: clamp(1rem, 3vw, 5.5rem);
        font-weight: 500;
        text-shadow: 0.1px 0.1px 5px rgba(0, 0, 0), 1px 0 0 rgb(0, 0, 0);
      }

      /* Hora */
      .hora {
        font-family: "DS-DIGITAL";
        position: absolute;
        top: 3%;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        text-shadow: 3px 3px 7px rgb(0, 0, 0), 2px 0 0 rgb(0, 0, 0);
        font-weight: 500;
        color: #ffffff;
        text-align: center;
      }

      .quadro {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        top: 52%;
        left: 49.2%;
        transform: translateX(-50%);
        width: 30%;
        height: 33%;
        font-size: clamp(1rem, 10vw, 7rem);
        border: 1px solid rgba(223, 217, 217, 0.603);
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.1805);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
        overflow: hidden;
      }


      div#horaAtual {
        display: inline-flex;
        justify-content: center;
      }

      span#sep {
        transform: translateY(-5px);
      }


      /* Ajustes para telas menores */

      @media (max-width: 860px) {
        .dias {
          top: 10%;
        }
      }
    </style>
  </head>
  <body>
    <div class="painel">
      <div class="dias neon" id="dias">0</div>
      
      
      <div class="quadro" id="quadro">
        <div class="hora" id="horaAtual">
          <span id="hh">00</span>
          <span id="sep">:</span>
          <span id="mm">00</span>
        </div>

        <div class="data" id="dataAtual">01/01/2025</div>

        <div class="dia_semana" id="dia_semana"></div>
      </div>
    </div>

    <script>
      // DATA INICIAL DO CONTADOR
      const DATA_INICIAL = new Date("2022-12-14T00:00:00");

      function atualizarPainel() {
        const quadro = document.querySelector(".quadro");
        const hora = quadro.querySelector(".hora");
        const data = quadro.querySelector(".data");
        const painel = document.querySelector(".painel");
        const nDias = painel.querySelector(".dias");

        hora.style.fontSize = `${quadro.clientWidth * 0.43}px`;
        data.style.fontSize = `${quadro.clientWidth * 0.12}px`;
        nDias.style.fontSize = `${painel.clientWidth * 0.085}px`;

        const agora = new Date();

        // DATA
        const options = { day: "2-digit", month: "2-digit" };
        document.getElementById("dataAtual").textContent = agora.toLocaleDateString("pt-BR", options);

        // HORA

        document.getElementById("hh").textContent = String(agora.getHours()).padStart(2, "0");

        document.getElementById("mm").textContent = String(agora.getMinutes()).padStart(2, "0");

        document.getElementById("sep").style.opacity = agora.getSeconds() % 2 === 0 ? "1" : "0";

        // DIA SEMANA

        const diasDaSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

        const hoje = new Date();

        const numeroDia = hoje.getDay();
        document.getElementById("dataAtual").textContent = document.getElementById("dataAtual").textContent + " " + diasDaSemana[numeroDia].substring(0, 3).toUpperCase();

        // DIAS CORRIDOS
        const diferenca = agora.getTime() - DATA_INICIAL.getTime();
        const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
        if(dias % 100 === 0 && (agora.getHours() % 6 === 0 || agora.toLocaleTimeString('pt-BR') == "00:00:00")){
          runConfetti();
          
        }
        document.getElementById("dias").textContent = dias.toLocaleString("pt-BR") + " DIAS";
      }

      atualizarPainel();
      
     

      //runConfetti();
      // Confetti: efeito por 5 segundos, partindo do alto até embaixo
      function runConfetti() {
        confetti({
          duration: 3000,
          spread: 360,
          origin: { 
            x: 0.5, 
            y: -0.5 
          },
          velocity: 0,
          gravity: 0.5,
          ticks: 8000,
        particleCount: 8000,
        
      });
      }
      
      setInterval(atualizarPainel, 1000);
      // Executa a checagem de deploy assim que abre e depois a cada 5 minutos (300000ms)
      setInterval(checarNovoDeploy, 120000);
      
      // Armazena a versão inicial da página (ETag ou data de modificação)
      let hashAtual = null;

      async function checarNovoDeploy() {
        try {
          // Faz uma requisição rápida apenas no cabeçalho da página para evitar consumo de dados
          const local = "https://127.0.0.1:8080/";
          const production = "https://proseg-nine.vercel.app";
          
          const resposta = await fetch(`${production}`, { method: "HEAD", cache: "no-cache" });
          // A Vercel gera um mapeamento único (ETag ou x-vercel-id) para cada deploy
          const novoHash = resposta.headers.get("etag") || resposta.headers.get("x-vercel-id") || resposta.headers.get("last-modified");
          
          if (hashAtual === null) {
            hashAtual = novoHash;
          } else if (hashAtual !== novoHash) {
            // Se o servidor responder com um hash diferente, um novo deploy foi feito!
            window.location.reload(true);
          }
        } catch (erro) {
          console.log("Erro ao checar deploy:", erro);
        }
      }

    </script>
  </body>
</html>
