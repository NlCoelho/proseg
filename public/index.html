<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.1.3/tsparticles.confetti.bundle.min.js"></script>
    <title>Painel Atitude Segura</title>

    <style>
      /* Fonte Normal */
      @font-face {
        font-family: "DS-DIGITAL";
        src: url("ds_digital/DS-DIGI.TTF") format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      /* Fonte Negrito (Bold) */
      @font-face {
        font-family: "DS-DIGITAL";
        src: url("ds_digital/DS-DIGIB.TTF") format("truetype");
        font-weight: bold;
        font-style: normal;
      }

      /* Fonte Itálico */
      @font-face {
        font-family: "DS-DIGITAL";
        src: url("ds_digital/DS-DIGII.TTF") format("truetype");
        font-weight: normal;
        font-style: italic;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-width: 100vw;
        font-family: Segoe UI, Arial, sans-serif;
      }

      .painel {
        position: relative;
        width: 100vw;
        height: 56.25vw;
        max-height: 100vh;
        max-width: 177.78vh;

        background-image: url("WhatsApp Image 2026-06-10 at 23.54.03.jpeg");
        background-size: 100% 100%;
        background-repeat: no-repeat;
        background-position: center;
      }

      /* Número de dias */

      .dias {
        position: absolute;
        left: 49%;
        top: 8.7vh;
        font-style: italic;
        transform: translateX(-50%);

        color: #fff;

        font-size: 14vh;
        font-weight: 900;

        text-shadow: 0 0 2px rgba(255, 255, 255, 0.4), 0 0 6px rgba(255, 255, 255, 0.7);

        letter-spacing: 2px;
      }

      /* Data */

      .data,
      .dia_semana {
        font-family: "DS-DIGITAL";
        letter-spacing: 5px;

        line-height: 1.1;

        color: #363636;

        text-align: center;

        font-size: clamp(1rem, 3.2vw, 3.5rem);

        font-weight: 900;

        text-shadow: 0 0 1px rgba(215, 215, 215, 0.4), 0 0 3px rgba(225, 225, 225, 0.8);
      }

      .dia_semana1 {
        top: 71.6%;
        color: #eee;
        letter-spacing: 2px;

        font-size: clamp(1vw, 1.75vw, 7vw);

        font-weight: 400;
      }

      /* Hora */

      .hora {
        font-family: "DS-DIGITAL";

        font-size: clamp(5px, 9.8vw, 10vw);
        text-shadow: 0 0 3px rgba(55, 55, 55, 0.4), 0 0 8px rgba(55, 55, 55, 0.8);

        font-weight: 500;
        color: #fff;

        text-align: center;
      }

      .quadro {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        top: 55%;
        left: 49.2%;
        transform: translateX(-50%);
        width: 20vw;
        height: 25vh;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
      }

      div#horaAtual {
        display: inline-flex;
        justify-content: center;
      }

      span#sep {
        padding-left: 4.5px;
        transform: translateY(-5px);
      }

      /* Ajustes para telas menores */

      @media (max-width: 910px) {
        body {
          transform: rotate(90deg);
        }

        .dias {
          top: 9%;
          font-size: clamp(2rem, 8.3vw, 9rem);
        }
        .quadro {
          width: 21%;
          height: 25%;
        }
        .data {
          width: 21%;
          top: 80%;
          left: 50%;
          font-size: clamp(1rem, 2vw, 3rem);
        }

        .hora {
          width: 25%;
          top: 63%;
          font-size: clamp(1rem, 10vw, 5rem);
        }
      }

      @media (max-width: 480px) {
        body {
          transform: rotate(90deg);
        }

        .dias {
          top: 9%;
          font-size: clamp(1rem, 8.3vw, 9rem);
        }
        .quadro {
          width: 21%;
          height: 30%;
        }
        .data {
          width: 21%;
          top: 80%;
          left: 50%;
          font-size: clamp(1rem, 2vw, 3rem);
        }

        .hora {
          width: 25%;
          top: 63%;
          font-size: clamp(1rem, 10vw, 5rem);
        }
      }
    </style>
  </head>
  <body>
    <div class="painel">
      <div class="dias" id="dias">0</div>
      <div class="quadro" id="quadro">
        <div class="hora" id="horaAtual">
          <span id="hh">00</span>
          <span id="sep">:</span>
          <span id="mm">00</span>
        </div>

        <div class="data" id="dataAtual">01/01/2025</div>

        <div class="dia_semana" id="dia_semana"></div>
      </div>
    </div>

    <script>
      // DATA INICIAL DO CONTADOR
      const DATA_INICIAL = new Date("2022-12-14T00:00:00");

      function atualizarPainel() {
        const agora = new Date();

        // DATA
        const options = { day: "2-digit", month: "2-digit" };
        document.getElementById("dataAtual").textContent = agora.toLocaleDateString("pt-BR", options);

        // HORA

        document.getElementById("hh").textContent = String(agora.getHours()).padStart(2, "0");

        document.getElementById("mm").textContent = String(agora.getMinutes()).padStart(2, "0");

        document.getElementById("sep").style.opacity = agora.getSeconds() % 2 === 0 ? "1" : "0";

        // DIA SEMANA

        const diasDaSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

        const hoje = new Date();

        const numeroDia = hoje.getDay();
        document.getElementById("dataAtual").textContent = document.getElementById("dataAtual").textContent + " " + diasDaSemana[numeroDia].substring(0, 3).toUpperCase();

        // DIAS CORRIDOS
        const diferenca = agora.getTime() - DATA_INICIAL.getTime();

        const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));

        document.getElementById("dias").textContent = dias.toLocaleString("pt-BR") + " DIAS";
      }

      atualizarPainel();

      setInterval(atualizarPainel, 1000);

      // Armazena a versão inicial da página (ETag ou data de modificação)
      let hashAtual = null;

      async function checarNovoDeploy() {
        try {
          // Faz uma requisição rápida apenas no cabeçalho da página para evitar consumo de dados
          const resposta = await fetch("https://proseg-pk4b.vercel.app", { method: "HEAD", cache: "no-cache" });
          console.log(resposta);
          // A Vercel gera um mapeamento único (ETag ou x-vercel-id) para cada deploy
          const novoHash = resposta.headers.get("etag") || resposta.headers.get("x-vercel-id");

          if (hashAtual === null) {
            hashAtual = novoHash;
          } else if (hashAtual !== novoHash) {
            // Se o servidor responder com um hash diferente, um novo deploy foi feito!
            window.location.reload();
          }
        } catch (erro) {
          console.log("Erro ao checar deploy:", erro);
        }
      }

      // Executa a checagem de deploy assim que abre e depois a cada 5 minutos (300000ms)
      setInterval(checarNovoDeploy, 300000);
    </script>
  </body>
</html>
